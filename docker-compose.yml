services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: embedder-ts
    hostname: ${TS_HOSTNAME:-embedder}
    environment:
      - TS_CLIENT_ID=file:/run/secrets/ts_client_id
      - TS_CLIENT_SECRET=file:/run/secrets/ts_client_secret
      - TS_EXTRA_ARGS=--advertise-tags=tag:${TS_TAG:-embedder}
      - TS_HOSTNAME=${TS_HOSTNAME:-embedder}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./secrets/ts_client_id:/run/secrets/ts_client_id:ro
      - ./secrets/ts_client_secret:/run/secrets/ts_client_secret:ro
      - ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_IMAGE_TAG:-89-1.9}
    container_name: embedder-tei
    network_mode: service:tailscale
    depends_on:
      - tailscale
    volumes:
      - tei-data:/data
    environment:
      - MODEL_ID=${MODEL_ID:-nomic-ai/nomic-embed-text-v1.5}
      - MAX_BATCH_TOKENS=${MAX_BATCH_TOKENS:-16384}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-512}
    entrypoint:
      - text-embeddings-router
    command:
      - --model-id
      - ${MODEL_ID:-nomic-ai/nomic-embed-text-v1.5}
      - --port
      - "8080"
      - --max-batch-tokens
      - ${MAX_BATCH_TOKENS:-16384}
      - --max-concurrent-requests
      - ${MAX_CONCURRENT_REQUESTS:-512}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    restart: unless-stopped

volumes:
  ts-state:
    driver: local
  tei-data:
    driver: local
