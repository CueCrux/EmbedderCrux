x-tei-common: &tei-common
  volumes:
    - tei-data:/data
  environment:
    - MODEL_ID=${MODEL_ID:-nomic-ai/nomic-embed-text-v1.5}
    - MAX_BATCH_TOKENS=${MAX_BATCH_TOKENS:-16384}
    - MAX_CLIENT_BATCH_SIZE=${MAX_CLIENT_BATCH_SIZE:-64}
    - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-512}
  command:
    - --model-id
    - ${MODEL_ID:-nomic-ai/nomic-embed-text-v1.5}
    - --port
    - "8080"
    - --max-batch-tokens
    - ${MAX_BATCH_TOKENS:-16384}
    - --max-client-batch-size
    - ${MAX_CLIENT_BATCH_SIZE:-64}
    - --max-concurrent-requests
    - ${MAX_CONCURRENT_REQUESTS:-512}
  restart: unless-stopped

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedder-gateway
    environment:
      - EMBEDDER_PORT=8080
      - TEI_BASE_URL=http://${TEI_BACKEND_SERVICE:-tei}:8080
      - EMBEDDER_SEQUENCE_MODE=${EMBEDDER_SEQUENCE_MODE:-disabled}
      - EMBEDDER_SEQUENCE_MAX_TOKENS=${EMBEDDER_SEQUENCE_MAX_TOKENS:-384}
      - EMBEDDER_TOKEN_BATCH_SIZE=${EMBEDDER_TOKEN_BATCH_SIZE:-64}
      - EMBEDDER_REQUEST_TIMEOUT_MS=${EMBEDDER_REQUEST_TIMEOUT_MS:-30000}
      - EMBEDDER_BODY_LIMIT_BYTES=${EMBEDDER_BODY_LIMIT_BYTES:-8388608}
      - MODEL_ID=${MODEL_ID:-nomic-ai/nomic-embed-text-v1.5}
    ports:
      - "${EMBEDDER_LOCAL_BIND:-127.0.0.1}:${EMBEDDER_HOST_PORT:-8080}:8080"
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.76.6
    container_name: embedder-ts
    hostname: ${TS_HOSTNAME:-embedder}
    environment:
      - TS_CLIENT_ID=${TS_CLIENT_ID:?set TS_CLIENT_ID from Vault}
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET:?set TS_CLIENT_SECRET from Vault}
      - TS_EXTRA_ARGS=--advertise-tags=tag:${TS_TAG:-embedder}
      - TS_HOSTNAME=${TS_HOSTNAME:-embedder}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  tei:
    <<: *tei-common
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_IMAGE_TAG:-cuda-1.9}
    container_name: embedder-tei
    gpus: all

  tei-cpu:
    <<: *tei-common
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_CPU_IMAGE_TAG:-cpu-1.9}
    container_name: embedder-tei-cpu
    profiles:
      - cpu-fallback

volumes:
  ts-state:
    driver: local
  tei-data:
    driver: local
