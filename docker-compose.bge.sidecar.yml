# BGE-M3 dense behind a Tailscale sidecar — for hosts NOT natively on the
# tailnet (this host: drivew-host, where the Docker engine and the host's
# tailscaled live in separate WSL2 network namespaces, so a plain host-port
# publish on :8089 is NOT reachable from tailnet peers like corecrux-gpu-1).
#
# The TEI container shares the sidecar's netns (network_mode: service:tailscale),
# so it gets its OWN tailnet identity (hostname embedder-drivew, tag:embedder)
# and is reachable at <that-node's-tailnet-ip>:8089 from the prod pool-router.
#
# Creds are passed at runtime (never stored here):
#   TS_CLIENT_ID=... TS_CLIENT_SECRET=... \
#     docker compose -f docker-compose.bge.sidecar.yml up -d
#
# Tear down:
#   docker compose -f docker-compose.bge.sidecar.yml down

services:
  tailscale:
    image: tailscale/tailscale:v1.76.6
    container_name: embedder-drivew-ts
    hostname: embedder-drivew
    environment:
      # Tailscale OAuth client secret used directly as the auth key. OAuth keys
      # authenticate non-interactively only when a tag is advertised (below).
      - TS_AUTHKEY=${TS_AUTHKEY:?set TS_AUTHKEY (the tskey-client-... OAuth secret) at runtime}
      - TS_EXTRA_ARGS=--advertise-tags=tag:embedder
      - TS_HOSTNAME=embedder-drivew
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-state-drivew:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  bgem3-dense:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.9
    container_name: embedder-bgem3-dense
    # Share the sidecar's network namespace → reachable on the tailnet.
    network_mode: service:tailscale
    depends_on:
      - tailscale
    volumes:
      - tei-cache:/data
    shm_size: 1g
    mem_limit: 10g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --model-id
      - BAAI/bge-m3
      - --dtype
      - float16
      - --port
      - "8089"
      - --max-batch-tokens
      - "16384"
      - --max-client-batch-size
      - "128"
      - --max-concurrent-requests
      - "384"
      - --payload-limit
      - "16777216"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -m 5 http://localhost:8089/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  tei-cache:
    name: tei-cache
    external: true
  ts-state-drivew:
    driver: local
